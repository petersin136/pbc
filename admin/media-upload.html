<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미디어 업로드 - 살리는 빛 부천침례교회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Google API -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
        }
        .upload-card {
            transition: all 0.3s ease;
        }
        .upload-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        .gallery-item {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .gallery-item:hover {
            transform: scale(1.02);
        }
        .gallery-item:hover .overlay {
            opacity: 1;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100">
    <script>
        // 인증 체크 (필수!)
        (function() {
            const isAuth = sessionStorage.getItem('bucheon_admin_auth');
            if (isAuth !== 'authenticated') {
                window.location.href = './login.html';
                throw new Error('인증 필요');
            }
        })();
    </script>

    <div class="min-h-screen py-8 px-4">
        <div class="max-w-7xl mx-auto">
            <!-- 헤더 -->
            <div class="bg-white rounded-2xl shadow-lg p-8 mb-8 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-4xl font-bold mb-2 bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                            미디어 갤러리
                        </h1>
                        <p class="text-gray-600 text-lg">사진, 영상, PDF 파일을 업로드하고 관리하세요</p>
                    </div>
                    <a href="./index.html" class="px-4 py-2 text-gray-600 hover:text-gray-900 transition">
                        ← 대시보드
                    </a>
                </div>
            </div>

            <!-- 업로드 섹션 -->
            <div class="bg-white rounded-2xl shadow-lg p-8 mb-8 border border-gray-100 upload-card">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">파일 업로드</h2>
                
                <!-- Google Drive 연동 -->
                <div class="mb-6">
                    <div class="bg-gradient-to-r from-green-50 to-blue-50 rounded-xl p-8 border-2 border-green-200">
                        <div class="text-center">
                            <div class="text-6xl mb-4">☁️</div>
                            <h3 class="text-2xl font-bold text-gray-800 mb-2">Google Drive에서 선택</h3>
                            <p class="text-sm text-gray-600 mb-4">Google Drive에 업로드된 파일을 선택하여 갤러리에 추가합니다</p>
                            <button onclick="openGoogleDrivePicker()" 
                                    class="bg-gradient-to-r from-green-600 to-blue-600 text-white px-8 py-3 rounded-xl font-semibold hover:from-green-700 hover:to-blue-700 transition shadow-lg hover:shadow-xl">
                                📂 Google Drive 열기
                            </button>
                            <div id="googleDriveStatus" class="mt-3">
                                <span class="text-xs text-gray-500">Google Drive에서 파일을 선택하세요</span>

                        </div>
                    </div>
                </div>

                <!-- 선택된 파일 미리보기 -->
                <div id="filePreview" class="hidden mb-6">
                    <h3 class="text-lg font-semibold mb-3 text-gray-700">선택된 파일</h3>
                    <div id="fileList" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
                </div>

                <!-- 카테고리 선택 -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        카테고리
                    </label>
                    <select id="categorySelect" 
                            class="block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white text-gray-700">
                        <option value="worship">예배</option>
                        <option value="sermon">설교</option>
                        <option value="event">행사</option>
                        <option value="student">학생부</option>
                        <option value="youth">청년부</option>
                        <option value="senior">장년부</option>

                        <option value="general">기타</option>
                        <option value="facility">교회시설</option>
                    </select>

                <!-- 저장 버튼 -->
                <button onclick="uploadFiles()" 
                        id="uploadBtn"
                        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-4 rounded-xl font-semibold hover:from-blue-700 hover:to-purple-700 transition-all shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed transform hover:scale-[1.02]">
                    <span id="uploadBtnText">💾 Google Drive 링크 저장하기</span>

                <!-- 진행 상태 -->

                    <div class="w-full bg-gray-200 rounded-full h-2.5">
                        <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>

                <!-- 메시지 -->
                <div id="message" class="mt-4 hidden"></div>
            </div>

            <!-- 업로드된 파일 목록 -->
            <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">업로드된 미디어</h2>
                    <div class="flex gap-2">
                        <select id="filterCategory" onchange="loadMediaList()" 
                                class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">전체 카테고리</option>
                            <option value="worship">예배</option>
                            <option value="sermon">설교</option>
                            <option value="event">행사</option>
                            <option value="student">학생부</option>
                            <option value="youth">청년부</option>
                            <option value="senior">장년부</option>
                            <option value="kids">주일학교</option>
                            <option value="general">기타</option>
                            <option value="facility">교회시설</option>
                        </select>
                        <button onclick="loadMediaList()" 
                                class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition font-medium">

                <div id="mediaList" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                    <!-- 미디어 목록이 여기에 표시됩니다 -->

    <script>
        // ================================================================
        // 설정 (Google Drive API 설정)
        // ================================================================
        const GOOGLE_API_KEY = 'AIzaSyAR0pKih7x68qN5m0TKL8P34DAjh6VTN-o';
        const GOOGLE_CLIENT_ID = '1001319276716-8p4k4v3c00nt7qkb995u4avn23pg4s3n.apps.googleusercontent.com';
        
        // Google Drive 폴더 ID 매핑
        const GOOGLE_DRIVE_FOLDERS = {
            'event': '1LjNa6LTwdZrGFcsDjereCDsP7QBZVryt',      // 교회행사
            'kids': '1vhJxT8UCFbwOWQ4LOCwYgitndwFs3yvl',       // 유치부
            'student': '1EBtYMGgJehVGN1CcbyrMd28J5BjHeoIF',    // 학생부
            'youth': '1JxUQ4AoFu1J3YGL_92kpKsyzjVXrQmXu',      // 청년부
            'senior': '1cUxlblL-kxSrNsY513pKsaXMzQkhOYP4',     // 장년부
            'facility': '1MCgzxA6hEsruFczEF157B63k4LyGBHj6'   // 교회시설
        };

        // Supabase 초기화
        const SUPABASE_URL = 'https://fkqxalcwhqohrkdzwhvv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrcXhhbGN3aHFvaHJrZHp3aHZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQ1MjE2MjAsImV4cCI6MjA1MDA5NzYyMH0.bKpBqLaWy6u1YvTG6gCtgaK8sgjYAP8CZR3Kf4p0C08';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Google Drive 관련 변수
        let googleAuthToken = null;
        let selectedGoogleFiles = [];

        // ================================================================
        // Google Drive 초기화
        // ================================================================
        async function initGoogleDrive() {
            if (GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID') {
                document.getElementById('googleDriveStatus').innerHTML = 
                    '<span class="text-xs text-yellow-500">⚠️ OAuth 클라이언트 ID 설정 필요</span>';
                return;
            }

            try {
                // Google API 로드
                await new Promise((resolve, reject) => {
                    if (typeof gapi === 'undefined') {
                        reject(new Error('Google API를 로드할 수 없습니다.'));
                        return;
                    }
                    gapi.load('picker', { callback: resolve, onerror: reject });
                });

                document.getElementById('googleDriveStatus').innerHTML = 
                    '<span class="text-xs text-green-500">✓ 연결 준비됨</span>';
            } catch (error) {
                console.error('Google Drive 초기화 실패:', error);
                document.getElementById('googleDriveStatus').innerHTML = 
                    '<span class="text-xs text-red-500">연결 실패</span>';
            }
        }

        // ================================================================
        // Google Drive Picker 열기
        // ================================================================
        async function openGoogleDrivePicker() {
            if (GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID') {
                showMessage('⚠️ Google OAuth 클라이언트 ID를 설정해주세요. GOOGLE-DRIVE-SETUP.md 파일을 참고하세요.', 'warning');
                return;
            }

            try {
                // OAuth 토큰 가져오기
                const tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: GOOGLE_CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/drive.readonly',
                    callback: async (tokenResponse) => {
                        if (tokenResponse.error) {
                            showMessage('Google 인증에 실패했습니다: ' + tokenResponse.error, 'error');
                            return;
                        }

                        // 토큰 저장
                        googleAuthToken = tokenResponse.access_token;

                        // 카테고리에 맞는 폴더 ID 가져오기
                        const category = document.getElementById('categorySelect').value;
                        const folderId = GOOGLE_DRIVE_FOLDERS[category];

                        // Picker 생성
                        const view = new google.picker.DocsView(google.picker.ViewId.DOCS_IMAGES_AND_VIDEOS)
                            .setIncludeFolders(false)
                            .setSelectFolderEnabled(false);
                        
                        // 특정 폴더가 있으면 해당 폴더로 제한
                        if (folderId) {
                            view.setParent(folderId);
                        }

                        const picker = new google.picker.PickerBuilder()
                            .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
                            .setOAuthToken(tokenResponse.access_token)
                            .setCallback(pickerCallback)
                            .addView(view)
                            .setTitle(folderId ? `Google Drive - ${category === 'event' ? '교회행사' : category === 'kids' ? '유치부' : category === 'student' ? '학생부' : category === 'senior' ? '장년부' : category === 'facility' ? '교회시설' : '청년부'} 폴더` : 'Google Drive에서 파일 선택')
                            .build();

                        picker.setVisible(true);
                    }
                });

                tokenClient.requestAccessToken();
            } catch (error) {
                console.error('Google Picker 오류:', error);
                showMessage('Google Drive 연결에 실패했습니다: ' + error.message, 'error');
            }
        }

        // ================================================================
        // Google Picker 콜백
        // ================================================================
        async function pickerCallback(data) {
            if (data[google.picker.Response.ACTION] === google.picker.Action.PICKED) {
                const docs = data[google.picker.Response.DOCUMENTS];
                selectedGoogleFiles = [];

                showMessage(`📥 ${docs.length}개 파일을 선택했습니다.`, 'success');

                // Google Drive 파일 정보를 그대로 저장 (다운로드하지 않음)
                selectedGoogleFiles = docs.map(doc => ({
                    id: doc.id,
                    name: doc.name,
                    mimeType: doc.mimeType,
                    url: doc.url,
                    embedUrl: `https://drive.google.com/file/d/${doc.id}/preview`,
                    thumbnailUrl: `https://drive.google.com/thumbnail?id=${doc.id}&sz=w400`,
                    originalUrl: `https://drive.google.com/uc?id=${doc.id}`
                }));

                // 파일 미리보기 표시
                displayFilePreview(selectedGoogleFiles);
                showMessage(`✅ ${selectedGoogleFiles.length}개 파일이 준비되었습니다.`, 'success');
            }
        }

        // ================================================================
        // 파일 미리보기 표시 (Google Drive 파일)
        // ================================================================
        function displayFilePreview(files) {
            const previewDiv = document.getElementById('filePreview');
            const fileListDiv = document.getElementById('fileList');

            if (!files || files.length === 0) {
                previewDiv.classList.add('hidden');
                return;
            }

            previewDiv.classList.remove('hidden');
            fileListDiv.innerHTML = '';

            files.forEach((file, index) => {
                const isImage = file.mimeType && file.mimeType.startsWith('image/');
                const fileCard = document.createElement('div');
                fileCard.className = 'border rounded-lg p-2 bg-gray-50';
                
                if (isImage) {
                    fileCard.innerHTML = `
                        <img src="${file.thumbnailUrl}" alt="${file.name}" 
                             class="w-full h-24 object-cover rounded mb-1">
                        <p class="text-xs text-gray-600 truncate" title="${file.name}">${file.name}</p>
                        <p class="text-xs text-blue-500">☁️ Google Drive</p>
                    `;
                } else {
                    fileCard.innerHTML = `
                        <div class="w-full h-24 bg-gray-200 rounded mb-1 flex items-center justify-center">
                            <span class="text-3xl">📄</span>
                        </div>
                        <p class="text-xs text-gray-600 truncate" title="${file.name}">${file.name}</p>
                        <p class="text-xs text-blue-500">☁️ Google Drive</p>
                    `;
                }
                
                fileListDiv.appendChild(fileCard);
            });
        }

        // ================================================================
        // Google Drive 파일 링크 저장 (업로드 없이)
        // ================================================================
        async function uploadFiles() {
            const category = document.getElementById('categorySelect').value;
            const uploadBtn = document.getElementById('uploadBtn');
            const uploadBtnText = document.getElementById('uploadBtnText');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const messageDiv = document.getElementById('message');

            if (selectedGoogleFiles.length === 0) {
                showMessage('Google Drive에서 파일을 선택해주세요.', 'error');
                return;
            }

            // UI 업데이트
            uploadBtn.disabled = true;
            uploadBtnText.innerHTML = '<span class="loading">⏳ 저장 중...</span>';
            progressContainer.classList.remove('hidden');
            messageDiv.classList.add('hidden');

            let successCount = 0;
            let errorCount = 0;

            for (let i = 0; i < selectedGoogleFiles.length; i++) {
                const file = selectedGoogleFiles[i];
                const progress = ((i + 1) / selectedGoogleFiles.length * 100).toFixed(0);
                progressBar.style.width = progress + '%';
                progressText.textContent = `저장 중... (${i + 1}/${selectedGoogleFiles.length}): ${file.name}`;

                try {
                    // Google Drive 링크만 저장 (파일은 업로드하지 않음)
                    const { error: dbError } = await supabase
                        .from('media_library')
                        .insert({
                            file_name: `gdrive_${file.id}`, // Google Drive ID로 구분
                            original_name: file.name,
                            file_url: file.embedUrl || file.originalUrl, // Google Drive embed 링크
                            file_type: file.mimeType || 'application/octet-stream',
                            file_size: 0, // Google Drive 파일이므로 크기 정보 없음
                            folder: category
                        });

                    if (dbError) throw dbError;

                    successCount++;
                    console.log('✅ Google Drive 링크 저장 성공:', file.name);

                } catch (error) {
                    errorCount++;
                    console.error('❌ 저장 실패:', file.name, error);
                }
            }

            // 완료 메시지
            uploadBtn.disabled = false;
            uploadBtnText.textContent = '💾 Google Drive 링크 저장하기';
            progressText.textContent = '저장 완료!';
            
            if (errorCount === 0) {
                showMessage(`✅ ${successCount}개 파일의 Google Drive 링크가 저장되었습니다!`, 'success');
            } else {
                showMessage(`⚠️ ${successCount}개 성공, ${errorCount}개 실패`, 'warning');
            }

            selectedGoogleFiles = [];
            document.getElementById('filePreview').classList.add('hidden');

            // 목록 새로고침
            setTimeout(() => {
                loadMediaList();
            }, 1000);
        }

        // 메시지 표시 함수
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.classList.remove('hidden');
            
            const bgColor = type === 'success' ? 'bg-green-100 text-green-800' :
                           type === 'error' ? 'bg-red-100 text-red-800' :
                           'bg-yellow-100 text-yellow-800';
            
            messageDiv.className = `mt-4 p-4 rounded-lg ${bgColor}`;
            messageDiv.textContent = text;
        }

        // ================================================================
        // 미디어 목록 로드
        // ================================================================
        async function loadMediaList() {
            const mediaList = document.getElementById('mediaList');
            const filterCategory = document.getElementById('filterCategory').value;
            mediaList.innerHTML = '<div class="col-span-full text-center py-12"><div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div><p class="mt-4 text-gray-500">로딩 중...</p></div>';

            try {
                let query = supabase
                    .from('media_library')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(100);

                if (filterCategory) {
                    query = query.eq('folder', filterCategory);
                }

                const { data, error } = await query;

                if (error) throw error;

                if (data.length === 0) {
                    mediaList.innerHTML = '<div class="col-span-full text-center py-12"><p class="text-gray-500 text-lg">업로드된 미디어가 없습니다.</p></div>';
                    return;
                }

                mediaList.innerHTML = data.map(item => {
                    const isImage = item.file_type?.startsWith('image/');
                    const isVideo = item.file_type?.startsWith('video/');
                    const sizeInMB = (item.file_size / 1024 / 1024).toFixed(2);
                    const categoryLabels = {
                        worship: '예배',
                        sermon: '설교',
                        event: '행사',
                        student: '학생부',
                        youth: '청년부',
                        senior: '장년부',
                        kids: '주일학교',
                        general: '기타',
                        facility: '교회시설'
                    };

                    return `
                        <div class="gallery-item border border-gray-200 rounded-xl overflow-hidden bg-white shadow-sm">
                            ${isImage ? `
                                <div class="relative aspect-square">
                                    <img src="${item.file_url}" alt="${item.original_name}" 
                                         class="w-full h-full object-cover">
                                    <div class="overlay">
                                        <button onclick="copyUrl('${item.file_url}')" 
                                                class="px-3 py-2 bg-white text-gray-800 rounded-lg hover:bg-gray-100 text-sm font-medium">
                                            📋 URL 복사
                                        </button>
                                        <button onclick="deleteMedia('${item.id}', '${item.file_name}')" 
                                                class="px-3 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 text-sm font-medium">
                                            🗑️ 삭제
                                        </button>
                                    </div>
                                </div>
                            ` : isVideo ? `
                                <div class="relative aspect-square">
                                    <video src="${item.file_url}" 
                                           class="w-full h-full object-cover"
                                           controls></video>
                                    <div class="overlay">
                                        <button onclick="copyUrl('${item.file_url}')" 
                                                class="px-3 py-2 bg-white text-gray-800 rounded-lg hover:bg-gray-100 text-sm font-medium">
                                            📋 URL 복사
                                        </button>
                                        <button onclick="deleteMedia('${item.id}', '${item.file_name}')" 
                                                class="px-3 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 text-sm font-medium">
                                            🗑️ 삭제
                                        </button>
                                    </div>
                                </div>
                            ` : `
                                <div class="relative aspect-square bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center">
                                    <span class="text-6xl">📄</span>
                                    <div class="overlay">
                                        <button onclick="copyUrl('${item.file_url}')" 
                                                class="px-3 py-2 bg-white text-gray-800 rounded-lg hover:bg-gray-100 text-sm font-medium">
                                            📋 URL 복사
                                        </button>
                                        <button onclick="deleteMedia('${item.id}', '${item.file_name}')" 
                                                class="px-3 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 text-sm font-medium">
                                            🗑️ 삭제
                                        </button>
                                    </div>
                                </div>
                            `}
                            <div class="p-3">
                                <p class="font-semibold text-sm text-gray-800 truncate mb-1" title="${item.original_name}">${item.original_name}</p>
                                <div class="flex items-center justify-between text-xs text-gray-500">
                                    <span class="px-2 py-1 bg-blue-50 text-blue-700 rounded-full">${categoryLabels[item.folder] || item.folder}</span>
                                    <span>${sizeInMB} MB</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                console.log('✅ 미디어 목록 로드 완료:', data.length);

            } catch (error) {
                console.error('❌ 미디어 목록 로드 실패:', error);
                mediaList.innerHTML = '<div class="col-span-full text-center py-12"><p class="text-red-500 text-lg">로드 실패: ' + error.message + '</p></div>';
            }
        }

        // ================================================================
        // URL 복사
        // ================================================================
        async function copyUrl(url) {
            try {
                await navigator.clipboard.writeText(url);
                showMessage('✅ URL이 클립보드에 복사되었습니다!', 'success');
            } catch (error) {
                // 대체 방법
                const textArea = document.createElement('textarea');
                textArea.value = url;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showMessage('✅ URL이 클립보드에 복사되었습니다!', 'success');
            }
        }

        // 미디어 삭제
        async function deleteMedia(id, fileName) {
            if (!confirm('정말 삭제하시겠습니까?')) return;

            try {
                // Storage에서 파일 삭제
                const { error: storageError } = await supabase.storage
                    .from('media')
                    .remove([fileName]);

                if (storageError) throw storageError;

                // DB에서 메타데이터 삭제
                const { error: dbError } = await supabase
                    .from('media_library')
                    .delete()
                    .eq('id', id);

                if (dbError) throw dbError;

                showMessage('✅ 삭제되었습니다.', 'success');
                loadMediaList();

            } catch (error) {
                console.error('❌ 삭제 실패:', error);
                showMessage('❌ 삭제 실패: ' + error.message, 'error');
            }
        }

        // ================================================================
        // 초기화
        // ================================================================
        window.addEventListener('DOMContentLoaded', async () => {
            loadMediaList();
            // Google Drive 초기화 (OAuth 클라이언트 ID가 설정된 경우에만)
            if (GOOGLE_CLIENT_ID !== 'YOUR_GOOGLE_CLIENT_ID') {
                await initGoogleDrive();
            }
        });
    </script>
</body>
</html>
